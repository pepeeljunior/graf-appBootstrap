<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Profile Card</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" href="assets/img/favicon.png">

<style>

body{
    background:#e5e5e5;
}

.header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}

.card{
    border-radius:15px;
    text-align:center;
    padding:20px;
}

.profile-img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin:auto;
}

.footer{
    background:#6c757d;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}

</style>

</head>

<body>

<div class="header">
    <h2>Profile Card Design</h2>
</div>

<div class="container mt-5">
<div class="row text-center">

<!-- Persona 1 -->
<div class="col-md-4 mb-4">
<div class="card shadow">
<img src="assets/img/persona 1.jpg" class="profile-img">
<h5 class="mt-3">Person One</h5>
<p>Esta es la persona número uno para revisar la tarjeta de información.</p>
</div>
</div>

<!-- Persona 2 -->
<div class="col-md-4 mb-4">
<div class="card shadow">
<img src="assets/img/persona 2.jpg" class="profile-img">
<h5 class="mt-3">Person Two</h5>
<p>Esta es la persona número dos para revisar la tarjeta de información.</p>
</div>
</div>

<!-- Persona 3 -->
<div class="col-md-4 mb-4">
<div class="card shadow">
<img src="assets/img/persona3.jpg" class="profile-img">
<h5 class="mt-3">Person Three</h5>
<p>Esta es la persona número tres para revisar la tarjeta de información.</p>
</div>
</div>

</div>
</div>

<div class="footer">
<h4>HTML CSS BOOTSTRAP</h4>
</div>

</body>
</html>
